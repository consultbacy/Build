<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CatalogueX — Developer Portal</title>
<meta name="description" content="CatalogueX — share product catalogues and track client interest">
<meta name="theme-color" content="#E8EEFF">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js" defer></script>
<style>
  /* Light (default) — very soft palette */
  :root, html[data-theme="light"]{
    color-scheme: light;
    --bg:#F7F8FB; --surface:#FFFFFF; --surface-2:#FBFBFD; --surface-3:#F1F3F8;
    --border:#E9ECF3; --border-strong:#DDE1EB;
    --text:#2C3140; --text-2:#6B7285; --text-3:#9AA1B2;
    --accent:#7B93F0; --accent-hover:#6A84E6; --accent-soft:#EEF2FF; --accent-ink:#5A6FBF;
    --success:#5AAB7A; --success-bg:#EEF8F1;
    --warning:#C49A4A; --warning-bg:#FFF8EC;
    --danger:#D07A72; --danger-bg:#FDF1F0;
    --radius:10px; --radius-lg:12px; --radius-xl:14px;
    --shadow:0 4px 16px rgba(60,70,100,.04);
    --shadow-sm:0 1px 3px rgba(60,70,100,.03);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --side:236px;
    --fs:13.5px; --fs-sm:12.5px; --fs-xs:11.5px; --fs-lg:14.5px; --fs-xl:17px; --fs-2xl:20px;
  }
  html[data-theme="dark"]{
    color-scheme: dark;
    --bg:#12141A; --surface:#1A1D26; --surface-2:#20242F; --surface-3:#282D3A;
    --border:#2E3444; --border-strong:#3C4458;
    --text:#E8EAF0; --text-2:#A0A7B8; --text-3:#7A8296;
    --accent:#8FA4F5; --accent-hover:#A3B4F8; --accent-soft:#232A42; --accent-ink:#C5D0FF;
    --success:#6FBE8E; --success-bg:#1A2B22;
    --warning:#D4B06A; --warning-bg:#2E2618;
    --danger:#E0958E; --danger-bg:#2E1E1C;
    --shadow:0 8px 24px rgba(0,0,0,.35);
    --shadow-sm:0 1px 4px rgba(0,0,0,.25);
  }
  *,*::before,*::after{box-sizing:border-box}
  html{
    height:100%;
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }
  body{
    margin:0; min-height:100%; min-height:100dvh;
    background:var(--bg); color:var(--text);
    font-family:var(--font); font-size:var(--fs); line-height:1.45;
    font-weight:400; -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  img,svg,video{max-width:100%; height:auto; display:block}
  button,input,select,textarea{font-family:inherit; font-size:var(--fs-sm); max-width:100%}
  button{cursor:pointer}
  a{color:var(--accent); text-decoration:none}
  a:hover{text-decoration:underline}
  strong,b{font-weight:550}

  /* Fluid spacing tokens — compact */
  :root, html[data-theme="light"], html[data-theme="dark"]{
    --pad-x: clamp(.65rem, 1.8vw, 1.1rem);
    --pad-y: clamp(.55rem, 1.2vw, .85rem);
    --gap: clamp(.4rem, 1vw, .65rem);
    --side: clamp(12.5rem, 16vw, 14rem);
    --fs: clamp(12.5px, .25vw + 12px, 13.25px);
    --fs-sm: clamp(11.5px, .18vw + 11.1px, 12.25px);
    --fs-xs: clamp(10.5px, .12vw + 10.2px, 11.25px);
    --fs-lg: clamp(13px, .25vw + 12.5px, 14.25px);
    --fs-xl: clamp(15px, .35vw + 14px, 17px);
    --fs-2xl: clamp(16.5px, .5vw + 15px, 19px);
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:.35rem;
    border:1px solid var(--border-strong); background:var(--surface); color:var(--text);
    border-radius:8px; padding:.48rem .8rem; font-weight:500; line-height:1.2;
    transition:background .15s, border-color .15s, color .15s, transform .1s;
    white-space:nowrap; min-height:2rem;
  }
  .btn:hover{background:var(--surface-2)}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.45; cursor:not-allowed}
  .btn-primary{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500}
  .btn-primary:hover{background:var(--accent-hover)}
  .btn-ghost{background:transparent; border-color:transparent; color:var(--text-2)}
  .btn-ghost:hover{background:var(--surface-2); color:var(--text)}
  .btn-danger{border-color:var(--danger); color:var(--danger); background:var(--danger-bg)}
  .btn-sm{padding:.32rem .55rem; font-size:var(--fs-xs); border-radius:7px; min-height:1.75rem}
  .btn-block{width:100%}
  .icon-btn{
    border:none; background:transparent; color:var(--text-2); padding:.35rem; border-radius:7px;
    display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;
    min-width:2rem; min-height:2rem;
  }
  .icon-btn:hover{background:var(--surface-3); color:var(--text)}

  input[type=text],input[type=number],input[type=search],input[type=password],input[type=email],select,textarea{
    width:100%; border:1px solid var(--border-strong); border-radius:7px;
    padding:.4rem .55rem; background:var(--surface); color:var(--text);
    min-height:2rem;
  }
  textarea{min-height:56px; resize:vertical; line-height:1.4}
  html[data-theme="dark"] input, html[data-theme="dark"] select, html[data-theme="dark"] textarea{
    background:var(--surface-2);
  }
  input:focus,select:focus,textarea:focus,button:focus-visible{
    outline:2px solid color-mix(in srgb, var(--accent) 45%, transparent); outline-offset:1px;
  }
  label{display:block; font-size:var(--fs-xs); font-weight:500; color:var(--text-2); margin-bottom:.3rem}
  .field{margin-bottom:.55rem; min-width:0}
  .badge{
    display:inline-flex; align-items:center; gap:.2rem; font-size:11px; font-weight:500;
    padding:.18rem .5rem; border-radius:999px; white-space:nowrap; max-width:100%;
  }
  .badge-success{background:var(--success-bg); color:var(--success)}
  .badge-warning{background:var(--warning-bg); color:var(--warning)}
  .badge-danger{background:var(--danger-bg); color:var(--danger)}
  .badge-neutral{background:var(--surface-3); color:var(--text-2)}
  .badge-accent{background:var(--accent-soft); color:var(--accent-ink)}

  /* ---- Gate / portal ---- */
  .portal{
    min-height:100%; min-height:100dvh; display:grid; place-items:center;
    padding:clamp(1rem, 4vw, 2.25rem) clamp(.75rem, 3vw, 1.5rem);
    background:
      radial-gradient(ellipse 55% 45% at 12% 0%, color-mix(in srgb, var(--accent) 8%, transparent), transparent 70%),
      radial-gradient(ellipse 45% 35% at 88% 100%, color-mix(in srgb, var(--accent) 6%, transparent), transparent 70%),
      var(--bg);
  }
  .portal-card{
    width:min(400px,100%); background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius-xl); padding:clamp(1.1rem, 3vw, 1.5rem) clamp(1rem, 2.5vw, 1.35rem);
    box-shadow:var(--shadow);
  }
  .portal-brand{display:flex; align-items:center; gap:.55rem; margin-bottom:1.15rem}
  .portal-brand .mark{
    width:34px; height:34px; border-radius:9px; background:var(--accent-soft); color:var(--accent-ink);
    border:1px solid color-mix(in srgb, var(--accent) 18%, var(--border));
    display:grid; place-items:center; font-weight:600; font-size:14px; flex-shrink:0;
  }
  .portal-brand h1{margin:0; font-size:clamp(1rem, 2.5vw, 1.1rem); font-weight:600; letter-spacing:-.01em}
  .portal-brand p{margin:.1rem 0 0; color:var(--text-2); font-size:var(--fs-xs)}
  .portal-tabs{
    display:flex; gap:.25rem; background:var(--surface-3); padding:.22rem; border-radius:9px;
    margin-bottom:1rem; flex-wrap:wrap;
  }
  .portal-tabs button{
    flex:1 1 auto; min-width:0; border:none; background:transparent;
    padding:.5rem clamp(.35rem, 1.5vw, .65rem); border-radius:7px;
    font-weight:500; color:var(--text-2); font-size:var(--fs-sm);
  }
  .portal-tabs button.active{background:var(--surface); color:var(--text); box-shadow:var(--shadow-sm)}
  .portal-note{font-size:var(--fs-xs); color:var(--text-3); margin-top:.85rem; text-align:center}

  /* ---- App shell ---- */
  #app{min-height:100%; min-height:100dvh; display:flex; width:100%}
  .shell{
    display:flex; width:100%; min-height:100vh; min-height:100dvh;
    align-items:stretch; position:relative;
  }
  body.nav-locked{overflow:hidden}
  .nav-backdrop{
    display:none; position:fixed; inset:0; z-index:40;
    background:rgba(20,24,36,.35); backdrop-filter:blur(2px);
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .shell.menu-open .nav-backdrop{opacity:1; pointer-events:auto}
  .menu-toggle{display:none}
  .side-close{display:none}
  .sidebar{
    width:var(--side); flex:0 0 var(--side); background:var(--surface);
    border-right:1px solid var(--border);
    display:flex; flex-direction:column; padding:.85rem .65rem;
    position:sticky; top:0; height:100vh; height:100dvh; max-height:100dvh;
    overflow:auto; z-index:30;
  }
  .side-brand{
    display:flex; align-items:center; gap:.5rem; padding:.15rem .35rem .45rem;
    min-width:0;
  }
  .side-brand-minimal{display:none}
  .side-brand .mark{display:none}
  .side-brand-text{display:none}
  .topbar-lead{
    display:flex; align-items:center; gap:.45rem; min-width:0; flex:1 1 10rem;
  }
  .topbar-lead .topbar-titles{min-width:0; flex:1}
  .nav-label{
    font-size:10.5px; font-weight:550; letter-spacing:.06em; text-transform:uppercase;
    color:var(--text-3); padding:.35rem .55rem .25rem; margin-top:.2rem;
  }
  .side-nav{display:flex; flex-direction:column; min-width:0}
  .navitem{
    display:flex; align-items:center; gap:.55rem; padding:.48rem .6rem; border-radius:8px;
    color:var(--text-2); cursor:pointer; font-weight:450; font-size:var(--fs-sm);
    margin-bottom:.08rem; user-select:none; border:none; background:transparent; width:100%; text-align:left;
    min-width:0;
  }
  .navitem span{min-width:0; overflow:hidden; text-overflow:ellipsis}
  .navitem:hover{background:var(--surface-2); color:var(--text)}
  .navitem.active{background:var(--accent-soft); color:var(--accent-ink); font-weight:550}
  .navitem .count{
    margin-left:auto; font-size:10.5px; font-weight:500; color:var(--text-3);
    background:var(--surface-3); min-width:1.35rem; text-align:center; padding:.08rem .32rem; border-radius:999px;
    flex-shrink:0;
  }
  .navitem.active .count{background:color-mix(in srgb, var(--accent) 16%, transparent); color:var(--accent-ink)}
  .side-foot{
    margin-top:auto; padding-top:.5rem; border-top:none; flex-shrink:0;
  }
  .side-company{
    display:flex; flex-direction:column; align-items:flex-start; gap:.28rem;
    margin:0 0 .45rem; padding:0; border:none; background:transparent; min-width:0; width:100%;
  }
  .side-company-logo-btn{
    display:inline-flex; cursor:pointer; margin:0 0 .15rem; padding:0; border:none; background:none;
  }
  .side-company-logo{
    width:56px; height:56px; border-radius:12px; object-fit:cover; flex-shrink:0;
    background:var(--surface-2); border:1px solid var(--border); display:block;
    box-shadow:0 2px 8px rgba(20,23,31,.06);
  }
  .side-company-logo-placeholder{
    width:56px; height:56px; border-radius:12px; flex-shrink:0;
    border:1.5px dashed var(--border-strong); background:var(--surface-2); color:var(--text-3);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.15rem;
    font-size:10px; font-weight:500;
  }
  .side-company-logo-btn:hover .side-company-logo{
    border-color:var(--accent); box-shadow:0 2px 10px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  .side-company-logo-btn:hover .side-company-logo-placeholder{
    border-color:var(--accent); color:var(--accent-ink); background:var(--accent-soft);
  }
  .side-company-input{
    width:100%; border:none; border-bottom:1px solid var(--border); border-radius:0;
    background:transparent; padding:.2rem 0; min-height:auto; font-size:var(--fs-xs); font-weight:600;
    color:var(--text);
  }
  .side-company-input:focus{outline:none; border-bottom-color:var(--accent)}
  .side-company-input-sub{font-weight:500; color:var(--text-2); font-size:10.5px}
  .side-company-name{
    font-size:var(--fs-xs); font-weight:600; line-height:1.25; color:var(--text);
    max-width:100%; word-break:break-word;
  }
  .side-company-brand{
    font-size:10.5px; font-weight:500; color:var(--text-2); line-height:1.25;
  }
  .side-foot-divider{
    height:1px; width:100%; background:var(--border); margin:0 0 .45rem; border:none;
  }
  .theme-wrap{width:100%}
  .theme-row{
    display:flex; gap:.2rem; background:var(--surface-3); padding:.22rem; border-radius:9px;
    border:1px solid var(--border); width:100%;
  }
  .theme-row button{
    flex:1 1 0; min-width:0; border:none; background:transparent; color:var(--text-2);
    font-size:clamp(9.5px, 1.8vw, 10.5px); font-weight:500;
    padding:.42rem .1rem; border-radius:7px;
    display:inline-flex; align-items:center; justify-content:center; gap:.15rem;
    cursor:pointer; white-space:nowrap;
  }
  .theme-row button:hover{color:var(--text); background:color-mix(in srgb, var(--surface) 70%, transparent)}
  .theme-row button.active{
    background:var(--surface); color:var(--accent-ink); box-shadow:var(--shadow-sm);
    border:1px solid var(--border);
  }
  .theme-label{
    font-size:10px; font-weight:500; color:var(--text-3); margin:0 0 .35rem 0;
    letter-spacing:.04em; text-transform:uppercase;
  }


  .main-wrap{
    flex:1 1 auto; min-width:0; display:flex; flex-direction:column;
    width:100%; max-width:100%;
  }
  .topbar{
    display:flex; flex-wrap:wrap; align-items:center; gap:.5rem .75rem;
    padding:var(--pad-y) var(--pad-x);
    background:color-mix(in srgb, var(--surface) 92%, transparent);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:20;
  }
  .topbar-titles{min-width:0}
  .topbar h1{
    margin:0; font-size:clamp(.95rem, 1.2vw + .7rem, 1.05rem);
    font-weight:600; letter-spacing:-.01em;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .topbar .sub{
    color:var(--text-2); font-size:var(--fs-xs); margin:.05rem 0 0;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:48rem;
  }
  .topbar .spacer{flex:1 1 auto; min-width:.5rem}
  .topbar input[type=search]{
    width:min(220px,100%); max-width:100%; flex:1 1 10rem;
  }
  .menu-toggle{
    border:1px solid var(--border);
    background:var(--surface-2);
    border-radius:9px;
    color:var(--text);
  }
  .menu-toggle:hover{background:var(--surface-3); color:var(--text)}
  .topbar-right{
    display:flex; align-items:center; gap:.35rem; margin-left:auto; flex-shrink:0;
  }
  .topbar-box{
    display:inline-flex; align-items:center; justify-content:center; gap:.3rem;
    padding:.32rem .6rem; border-radius:8px; font-size:var(--fs-xs); font-weight:550;
    border:1px solid var(--border); background:var(--surface); color:var(--text);
    white-space:nowrap; max-width:10rem; overflow:hidden; text-overflow:ellipsis;
    line-height:1.2; min-height:1.9rem;
  }
  .topbar-box-name{
    background:var(--accent-soft); color:var(--accent-ink);
    border-color:color-mix(in srgb, var(--accent) 18%, var(--border));
  }
  .topbar-box-role{
    background:var(--surface-2); color:var(--text-2); font-weight:500;
  }
  .topbar-box-logout{
    cursor:pointer; font-family:inherit; color:var(--text-2); font-weight:500;
  }
  .topbar-box-logout:hover{
    background:var(--danger-bg); color:var(--danger); border-color:color-mix(in srgb, var(--danger) 30%, var(--border));
  }
  main{
    flex:1 1 auto; padding:var(--pad-y) var(--pad-x) clamp(1.5rem, 4vw, 2.25rem);
    overflow:auto; width:100%; min-width:0;
  }

  .page-head{margin-bottom:.55rem}
  .page-head h1{
    margin:0 0 .1rem; font-size:var(--fs-2xl); font-weight:600; letter-spacing:-.02em;
    line-height:1.25;
  }
  .page-head p{
    margin:0; color:var(--text-2); font-size:var(--fs-sm);
    max-width:40rem; line-height:1.35;
  }

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:.7rem .8rem; box-shadow:none;
    min-width:0;
  }
  .grid{display:grid; gap:var(--gap)}
  .grid-4{
    grid-template-columns:repeat(auto-fit, minmax(min(100%, 8.5rem), 1fr));
  }
  .grid-cards{
    grid-template-columns:repeat(4, minmax(0, 1fr));
    gap:.65rem;
  }
  .grid-2{
    grid-template-columns:minmax(0,1.1fr) minmax(0,.9fr);
  }
  .grid-form-2{
    display:grid; gap:var(--gap);
    grid-template-columns:repeat(2, minmax(0,1fr));
  }
  .grid-form-4{
    display:grid; gap:var(--gap);
    grid-template-columns:repeat(4, minmax(0,1fr));
  }

  .metric-label{margin:0 0 .15rem; font-size:var(--fs-xs); color:var(--text-2); font-weight:500}
  .metric-value{
    margin:0; font-size:1.15rem;
    font-weight:600; letter-spacing:-.02em;
  }

  .toolbar{
    display:flex; flex-wrap:wrap; gap:.4rem; align-items:center;
    margin-bottom:.65rem; width:100%;
  }
  .toolbar .spacer{flex:1 1 auto; min-width:0}
  .toolbar > input,
  .toolbar > select{
    flex:1 1 7.5rem; width:auto; min-width:0; max-width:100%;
  }
  .sel-bar{
    display:flex; flex-wrap:wrap; gap:.4rem; align-items:center;
    background:var(--accent-soft); border:1px solid color-mix(in srgb, var(--accent) 22%, var(--border));
    border-radius:8px; padding:.4rem .55rem; margin-bottom:.55rem; font-size:var(--fs-sm);
    width:100%;
  }
  .sel-bar .spacer{flex:1 1 4rem; min-width:0}
  .sel-bar strong{font-weight:550}

  .product-card{
    position:relative; background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); overflow:hidden; transition:border-color .15s;
    min-width:0; height:100%; display:flex; flex-direction:column;
  }
  .product-card:hover{border-color:var(--border-strong)}
  .product-card.selected{border-color:var(--accent); box-shadow:0 0 0 1px color-mix(in srgb, var(--accent) 35%, transparent)}
  .product-card .thumb{
    height:clamp(96px, 12vw, 128px); background:var(--surface-3);
    display:grid; place-items:center; color:var(--text-3); overflow:hidden; flex-shrink:0;
  }
  .product-card .thumb img{width:100%; height:100%; object-fit:cover}
  .product-card .body{padding:.65rem .7rem .7rem; flex:1; display:flex; flex-direction:column; min-width:0; gap:0}
  .product-card .chk{
    position:absolute; top:.45rem; left:.45rem; width:1rem; height:1rem;
    accent-color:var(--accent); z-index:2;
  }
  .product-card h3{
    margin:0 0 .25rem; font-size:.95rem; font-weight:600; line-height:1.25;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .product-card .meta{margin:0 0 .25rem; color:var(--text-2); font-size:var(--fs-xs); line-height:1.35}
  .product-card .desc{
    margin:.3rem 0 .35rem; color:var(--text-2); font-size:var(--fs-xs); line-height:1.4;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .product-card .price{font-size:1rem; font-weight:600; letter-spacing:-.01em}
  .product-card .pc-sku{
    margin:0 0 .3rem; font-size:var(--fs-xs); color:var(--text-2); font-weight:500;
  }
  .product-card .pc-label{
    display:inline-block; min-width:3.2rem; color:var(--text-3); font-weight:500; font-size:10.5px;
    text-transform:uppercase; letter-spacing:.03em; margin-right:.25rem;
  }
  .product-card .pc-chips{display:flex; flex-direction:column; gap:.25rem; margin:0 0 .35rem}
  .product-card .pc-chip-row{display:flex; flex-wrap:wrap; align-items:flex-start; gap:.2rem}
  .product-card .pc-chip-list{display:flex; flex-wrap:wrap; gap:.2rem; flex:1; min-width:0}
  .product-card .pc-chip{
    display:inline-block; padding:.1rem .35rem; border-radius:999px; font-size:10.5px; font-weight:500;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-2);
  }
  .product-card .pc-foot{
    display:flex; align-items:center; justify-content:space-between; gap:.5rem; flex-wrap:wrap; margin-top:.45rem;
  }
  .product-card .card-actions{
    display:flex; flex-wrap:wrap; gap:.25rem; align-items:center; margin-top:auto; padding-top:.45rem;
  }
  .product-card .badge{font-size:10.5px; padding:.12rem .4rem}

  /* Specs: simple vertical stack, no heavy boxes */
  .meta-label{
    font-size:10px; font-weight:550; color:var(--text-3); text-transform:uppercase;
    letter-spacing:.04em; margin:.3rem 0 .15rem;
  }
  .chip-row{display:flex; flex-direction:column; align-items:stretch; gap:0; margin:0}
  .chip{
    display:block; padding:.15rem 0; border-radius:0;
    font-size:var(--fs-xs); font-weight:400; background:transparent; color:var(--text);
    border:none; border-bottom:1px solid var(--border); max-width:100%; line-height:1.35;
  }
  .chip-row .chip:last-child{border-bottom:none}
  .chips-color .chip,.chips-size .chip{background:transparent; color:var(--text); border-color:var(--border)}
  .spec-list{
    margin:.1rem 0 .25rem; padding:0; border:none; border-radius:0;
    background:transparent; display:flex; flex-direction:column; gap:0;
  }
  .spec-list .spec-row{
    display:flex; flex-direction:column; align-items:stretch; gap:0;
    font-size:var(--fs-xs); padding:.2rem 0;
    border:none; border-bottom:1px solid var(--border);
  }
  .spec-list .spec-row:last-child{border-bottom:none}
  .spec-list dt{
    margin:0; color:var(--text-3); font-weight:500; font-size:10px;
    text-transform:none; letter-spacing:0; line-height:1.3;
  }
  .spec-list dd{margin:0; color:var(--text); word-break:break-word; line-height:1.35; font-size:var(--fs-xs)}

  .list-editor{display:flex; flex-direction:column; gap:.3rem; margin-bottom:.55rem}
  .list-editor-row{
    display:grid; grid-template-columns:1fr auto; gap:.3rem; align-items:center;
  }
  .spec-edit-row{
    display:flex; flex-direction:column; gap:.25rem;
    padding:.3rem 0 .4rem; border:none; border-bottom:1px solid var(--border);
    border-radius:0; background:transparent; position:relative; padding-right:2rem;
  }
  .spec-edit-row .spec-key,
  .spec-edit-row .spec-val{width:100%}
  .spec-edit-row .icon-btn{position:absolute; right:0; top:.25rem}
  .list-editor-row input,.spec-edit-row input{min-width:0}
  .specs-editor{display:flex; flex-direction:column; gap:0; margin-bottom:.35rem}
  .specs-toolbar{display:flex; flex-wrap:wrap; gap:.25rem; margin:.2rem 0 .35rem; align-items:center}
  .specs-toolbar .hint{font-size:var(--fs-xs); color:var(--text-3); width:100%; margin-bottom:.1rem}
  .spec-preset{
    border:1px solid var(--border); background:var(--surface); color:var(--text-2);
    border-radius:6px; padding:.2rem .4rem; font-size:10.5px; font-weight:500; cursor:pointer;
  }
  .spec-preset:hover{background:var(--accent-soft); color:var(--accent-ink); border-color:color-mix(in srgb, var(--accent) 25%, var(--border))}
  .basic-fields-editor{display:flex; flex-direction:column; gap:0; margin-bottom:.55rem}
  .basic-field-row{
    display:flex; flex-direction:column; gap:.2rem;
    padding:.3rem 0 .4rem; border:none; border-bottom:1px solid var(--border);
    border-radius:0; background:transparent; position:relative; padding-right:2rem;
  }
  .basic-field-row label{margin:0; font-size:10px; color:var(--text-3); font-weight:500}
  .basic-field-row input,.basic-field-row select{min-width:0; width:100%}
  .basic-field-row .icon-btn{position:absolute; right:0; top:.15rem}
  .basic-add-row{display:flex; flex-wrap:wrap; gap:.25rem; margin-top:.3rem}
  .core-field-stack{display:flex; flex-direction:column; gap:.45rem; margin-bottom:.55rem}
  .core-field-stack .field{margin-bottom:0}
  .category-new-wrap{display:none; margin-top:.3rem}
  .category-new-wrap.show{display:block}
  .modal.wide{width:min(480px,100%)}

  .table-wrap{
    width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch;
    border-radius:var(--radius-lg);
  }
  table{width:100%; border-collapse:collapse; font-size:var(--fs-sm); min-width:28rem}
  th{
    text-align:left; color:var(--text-2); font-weight:500; padding:.55rem .4rem;
    border-bottom:1px solid var(--border); font-size:var(--fs-xs); white-space:nowrap;
  }
  td{padding:.6rem .4rem; border-bottom:1px solid var(--border); vertical-align:middle}
  tr:last-child td{border-bottom:none}

  .empty{text-align:center; padding:clamp(1.25rem, 4vw, 2rem) 1rem; color:var(--text-3)}
  .drop{
    border:1.5px dashed var(--border-strong); border-radius:var(--radius-lg);
    padding:clamp(1rem, 3vw, 1.25rem); text-align:center; background:var(--surface-2); margin-bottom:.75rem;
  }
  .drop.drag{border-color:var(--accent); background:var(--accent-soft)}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(15,18,28,.42);
    display:grid; place-items:center; align-content:center;
    z-index:60; padding:clamp(.5rem, 2.5vw, 1rem); backdrop-filter:blur(2px);
    overflow:auto;
  }
  .modal{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    width:min(480px,100%); max-height:min(90vh, 90dvh); overflow:auto;
    padding:.9rem 1rem; box-shadow:var(--shadow);
    margin:auto;
  }
  .modal h2{margin:0 0 .55rem; font-size:1rem; font-weight:600}
  .modal-actions{
    display:flex; flex-wrap:wrap; justify-content:flex-end; gap:.35rem; margin-top:.7rem;
  }
  .modal .section-label,
  .section-label{
    font-size:10px; font-weight:550; text-transform:uppercase; letter-spacing:.04em;
    color:var(--text-3); margin:.65rem 0 .3rem;
  }

  .toast-stack{
    position:fixed; bottom:clamp(.6rem, 2vw, 1rem); right:clamp(.6rem, 2vw, 1rem);
    left:auto; display:flex; flex-direction:column; gap:.4rem; z-index:100;
    max-width:min(22rem, calc(100vw - 1.2rem)); pointer-events:none;
  }
  .toast{
    background:var(--text); color:var(--bg); padding:.55rem .85rem; border-radius:8px;
    font-size:var(--fs-sm); font-weight:500; box-shadow:var(--shadow);
    pointer-events:auto; word-break:break-word;
  }

  .interest-dot{
    width:7px; height:7px; border-radius:50%; background:var(--accent); display:inline-block; flex-shrink:0;
  }
  .link-row{
    display:flex; flex-wrap:wrap; gap:.5rem .65rem; align-items:center; padding:.7rem 0;
    border-bottom:1px solid var(--border); min-width:0;
  }
  .link-row:last-child{border-bottom:none}
  .link-row > div{min-width:0}
  .link-row strong{word-break:break-word}
  .link-row-icon{flex-shrink:0; color:var(--text-3); display:inline-flex}
  .link-row-actions{display:flex; align-items:center; gap:.25rem; flex-shrink:0; margin-left:auto}

  /* Public share view */
  .public{min-height:100%; min-height:100dvh; background:var(--bg); width:100%}
  .public-bar{
    position:sticky; top:0; z-index:10; display:flex; flex-wrap:wrap; align-items:center;
    gap:.5rem .75rem; padding:var(--pad-y) var(--pad-x);
    background:var(--surface); border-bottom:1px solid var(--border);
  }
  .public-bar > div{min-width:0}
  .public-grid{
    width:100%; max-width:1200px; margin:0 auto;
    padding:var(--pad-y) var(--pad-x) 1.5rem;
    display:grid;
    grid-template-columns:repeat(4, minmax(0, 1fr));
    gap:.65rem;
  }
  @media (max-width:1200px){
    .public-grid{grid-template-columns:repeat(3, minmax(0, 1fr))}
  }
  @media (max-width:900px){
    .public-grid{grid-template-columns:repeat(2, minmax(0, 1fr))}
  }
  .interest-btn.interested{background:var(--success-bg); border-color:var(--success); color:var(--success)}

  /* Settings layout */
  .settings-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:var(--gap);
    margin-bottom:var(--gap); align-items:stretch;
  }
  .settings-grid-equal{align-items:stretch}
  .settings-card{margin:0}
  .settings-card-equal{
    display:flex; flex-direction:column; height:100%; min-height:100%;
  }
  /* Settings accordion — closed by default */
  .settings-acc-list{display:flex; flex-direction:column; gap:.5rem}
  .settings-acc{margin:0; padding:0; overflow:hidden}
  .settings-acc-head{
    width:100%; display:flex; align-items:center; justify-content:space-between; gap:.65rem;
    margin:0; padding:.7rem .85rem; border:0; background:transparent; cursor:pointer;
    color:inherit; font:inherit; text-align:left;
  }
  .settings-acc-head:hover{background:var(--surface-2)}
  .settings-acc-title{font-size:var(--fs-sm); font-weight:600; letter-spacing:-.01em}
  .settings-acc-chevron{color:var(--text-3); font-size:.85rem; flex-shrink:0}
  .settings-acc-body{padding:0 .85rem .85rem; border-top:1px solid var(--border)}
  .settings-acc-body[hidden]{display:none !important}
  .settings-acc.open .settings-acc-head{background:color-mix(in srgb, var(--accent) 6%, transparent)}
  .display-check-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(11rem, 1fr)); gap:.35rem .55rem;
  }
  .display-check{
    display:flex; align-items:center; gap:.4rem; font-size:var(--fs-xs); font-weight:500;
    padding:.3rem .4rem; border-radius:8px; border:1px solid var(--border); background:var(--surface-2);
    cursor:pointer;
  }
  .display-check input{width:auto; accent-color:var(--accent); margin:0}
  .gs-fields{display:flex; flex-direction:column; gap:.55rem; margin-bottom:.35rem}
  .gs-field-row{
    display:flex; flex-direction:column; gap:.3rem;
    padding:.45rem .5rem; border:1px solid var(--border); border-radius:8px; background:var(--surface-2);
  }
  .gs-field-head{display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:.25rem}
  .gs-field-meta{font-size:10px; color:var(--text-3); font-weight:500}
  .gs-field-control{display:flex; flex-direction:column; gap:.35rem}
  .gs-multi-opts{display:flex; flex-wrap:wrap; gap:.3rem}
  .gs-multi-chip{
    display:inline-flex; align-items:center; gap:.25rem; padding:.2rem .4rem; border-radius:999px;
    border:1px solid var(--border); background:var(--surface); font-size:var(--fs-xs); font-weight:500; cursor:pointer;
  }
  .gs-multi-chip input{width:auto; margin:0; accent-color:var(--accent)}
  .gs-heading-props{
    display:flex; flex-direction:column; gap:.4rem; margin:0 0 .45rem;
    padding:.45rem .5rem; border:1px solid var(--border); border-radius:8px; background:var(--surface);
  }
  .photo-upload input[type=file]{font-size:var(--fs-xs); max-width:100%}
  .photo-preview-list{
    display:flex; flex-wrap:wrap; gap:.4rem; margin-top:.45rem; min-height:2rem;
  }
  .photo-thumb{
    position:relative; width:72px; height:72px; border-radius:8px; overflow:hidden;
    border:1px solid var(--border); background:var(--surface-2);
  }
  .photo-thumb img{width:100%; height:100%; object-fit:cover; display:block}
  .photo-thumb .photo-remove{
    position:absolute; top:2px; right:2px; background:rgba(0,0,0,.55); color:#fff; border-radius:6px;
  }
  .settings-stack{display:flex; flex-direction:column; gap:.4rem}
  .settings-stack-grow{flex:1; min-height:0; display:flex; flex-direction:column}
  .settings-stack .field{margin:0}
  .settings-card-foot{padding-top:.15rem}
  .bp-logo-field{display:flex; flex-direction:column}
  .bp-logo-area{
    display:flex; flex-direction:column; align-items:flex-start; gap:.4rem;
  }
  .bp-logo-lg{
    width:72px; height:72px; border-radius:12px; object-fit:cover;
    border:1px solid var(--border); background:var(--surface-2); display:block;
    box-shadow:0 1px 6px rgba(20,23,31,.05); flex-shrink:0;
  }
  .bp-logo-empty{
    display:grid; place-items:center; color:var(--text-3); font-size:var(--fs-xs); font-weight:500;
    border-style:dashed;
  }
  .bp-logo-actions{display:flex; flex-wrap:wrap; gap:.35rem; align-items:center; width:100%}
  .bp-logo-actions input[type=file]{font-size:var(--fs-xs); max-width:100%}
  .settings-users-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(14rem, 1fr));
    gap:.55rem;
  }
  .settings-user{
    padding:.5rem .55rem; border:1px solid var(--border); border-radius:8px;
    background:var(--surface-2);
  }
  .settings-actions{
    display:flex; flex-wrap:wrap; gap:.35rem; align-items:center; margin-top:.15rem;
  }
  .settings-user-actions{
    display:flex; flex-wrap:wrap; gap:.35rem; align-items:center; margin-top:.2rem;
  }
  .access-check-list{
    max-height:260px; overflow:auto; border:1px solid var(--border); border-radius:8px;
    background:var(--surface-2); padding:.35rem .45rem; margin:.35rem 0 .55rem;
  }
  .access-check-row{
    display:flex; align-items:flex-start; gap:.45rem; padding:.3rem .2rem;
    font-size:var(--fs-xs); border-bottom:1px solid var(--border);
  }
  .access-check-row:last-child{border-bottom:0}
  .access-check-row input{margin-top:.15rem; flex-shrink:0}
  .access-check-meta{color:var(--text-3); font-size:var(--fs-xs)}
  .settings-actions input{flex:1 1 8rem; min-width:0; max-width:100%}
  .settings-empty{margin:0; padding:.35rem 0; color:var(--text-3); font-size:var(--fs-xs)}
  .settings-options{
    max-height:220px; overflow:auto; margin:0;
    border:1px solid var(--border); border-radius:8px;
    background:var(--surface-2); padding:.15rem .35rem;
  }
  .settings-options-list{padding:.1rem .3rem}
  .settings-option-row{
    display:flex; align-items:center; justify-content:space-between; gap:.35rem;
    padding:.28rem .15rem; border-bottom:1px solid var(--border); font-size:var(--fs-sm);
  }
  .settings-option-row:last-child{border-bottom:none}
  .settings-gs-panel{margin-bottom:var(--gap); max-width:100%}
  .settings-gs-intro{
    margin:0 0 .5rem; color:var(--text-2); font-size:var(--fs-xs); line-height:1.35;
  }
  .gs-panel{
    display:grid; grid-template-columns:1fr 1fr;
    gap:.55rem; align-items:stretch;
  }
  .gs-panel-left,.gs-panel-right{
    display:flex; flex-direction:column; gap:.3rem; min-width:0;
  }
  .gs-panel-title{
    font-size:10px; font-weight:550; color:var(--text-3); text-transform:uppercase; letter-spacing:.04em;
  }
  .gs-heading-list,
  .gs-panel-right .settings-options{
    flex:1 1 auto; height:180px; max-height:180px; overflow:auto;
    border:1px solid var(--border); border-radius:8px;
    background:var(--surface-2); padding:.15rem;
  }
  .gs-heading-item,
  .settings-option-row[data-gs-drag]{
    width:100%; display:flex; align-items:center; gap:.3rem;
    border:none; background:transparent; text-align:left; padding:.28rem .3rem; border-radius:6px;
    color:var(--text); font-size:var(--fs-xs); font-weight:450; cursor:grab;
  }
  .gs-heading-item:hover,
  .settings-option-row[data-gs-drag]:hover{background:var(--surface)}
  .gs-heading-item.active{background:var(--accent-soft); color:var(--accent-ink); font-weight:550}
  .gs-heading-item.gs-dragging,
  .settings-option-row.gs-dragging{opacity:.45; cursor:grabbing}
  .gs-heading-item.gs-drag-over,
  .settings-option-row.gs-drag-over{
    outline:1px dashed var(--accent); background:color-mix(in srgb, var(--accent) 8%, transparent);
  }
  .gs-drag-handle{
    flex-shrink:0; width:1rem; text-align:center; color:var(--text-3); font-size:9px;
    letter-spacing:-1px; line-height:1; user-select:none; cursor:grab;
  }
  .gs-heading-btn{
    flex:1; min-width:0; display:flex; align-items:center; justify-content:space-between; gap:.35rem;
    border:none; background:transparent; padding:0; color:inherit; font:inherit; cursor:pointer; text-align:left;
  }
  .gs-heading-label,.gs-option-label{
    flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .gs-count{
    font-size:9.5px; color:var(--text-3); background:var(--surface); border:1px solid var(--border);
    border-radius:999px; min-width:1.2rem; text-align:center; padding:.04rem .28rem; flex-shrink:0;
  }
  .gs-heading-item.active .gs-count{border-color:transparent; background:color-mix(in srgb, var(--accent) 14%, transparent); color:var(--accent-ink)}
  .settings-option-row[data-gs-drag] .icon-btn{margin-left:auto; flex-shrink:0}
  .gs-panel-left .settings-actions,
  .gs-panel-right .settings-actions{margin-top:.1rem}
  .gs-panel-left .settings-actions input,
  .gs-panel-right .settings-actions input{flex:1 1 6rem; font-size:var(--fs-xs); min-height:1.85rem; padding:.3rem .45rem}
  .spec-mini-label{
    display:block; font-size:10px; color:var(--text-3); font-weight:500; margin:0;
  }
  .spec-edit-row select{width:100%}
  @media (max-width:900px){
    .settings-grid{grid-template-columns:1fr}
    .gs-panel{grid-template-columns:1fr}
    .gs-heading-list,
    .gs-panel-right .settings-options{height:150px; max-height:150px}
  }

  /* Quick share by SKU */
  .qs-sku-row{display:flex; flex-wrap:wrap; gap:.4rem; align-items:center}
  .qs-sku-row input{flex:1 1 10rem; min-width:0}
  .qs-sku-match{
    margin-top:.4rem; padding:.45rem .55rem; border:1px solid var(--border);
    border-radius:8px; background:var(--surface-2); min-height:2.4rem;
  }
  .qs-sku-hit strong{display:block; font-size:var(--fs-sm)}
  .qs-sku-hit .meta{display:block; color:var(--text-3); font-size:var(--fs-xs); margin-top:.1rem}
  .qs-sku-miss{margin:0; color:var(--text-3); font-size:var(--fs-xs)}
  .share-stats{
    display:grid; grid-template-columns:repeat(5, minmax(0,1fr)); gap:var(--gap);
  }
  .share-stat{
    display:flex; flex-direction:column; align-items:flex-start; gap:.1rem;
    margin:0; padding:.55rem .65rem; border:1px solid var(--border); border-radius:10px;
    background:var(--surface); cursor:pointer; text-align:left; color:inherit;
    font:inherit; transition:border-color .12s, box-shadow .12s;
  }
  .share-stat:hover{border-color:color-mix(in srgb, var(--accent) 35%, var(--border))}
  .share-stat.active{
    border-color:color-mix(in srgb, var(--accent) 45%, var(--border));
    box-shadow:0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent);
    background:var(--accent-soft);
  }
  .share-stat .metric-value{font-size:1.1rem}

  /* Shared link protection */
  .public-protected{
    -webkit-user-select:none; user-select:none;
  }
  .public-protected input,.public-protected textarea,.public-protected button{
    -webkit-user-select:text; user-select:text;
  }
  .wm-wrap{position:relative; overflow:hidden}
  .wm-mark{
    position:absolute; inset:0; display:grid; place-items:center;
    pointer-events:none; font-size:clamp(11px, 2.2vw, 14px); font-weight:700;
    letter-spacing:.08em; text-transform:uppercase;
    color:rgba(255,255,255,.42); text-shadow:0 1px 2px rgba(0,0,0,.25);
    transform:rotate(-24deg); white-space:nowrap;
  }
  .public-protected img{-webkit-user-drag:none; user-select:none}

  /* ---- Breakpoints ---- */

  /* Large tablets / small laptops */
  @media (max-width:1200px){
    .grid-cards{grid-template-columns:repeat(3, minmax(0, 1fr))}
  }
  @media (max-width:1100px){
    .grid-2{grid-template-columns:1fr}
    .grid-form-4{grid-template-columns:repeat(2, minmax(0,1fr))}
  }

  /* Tablet & phone: hamburger + off-canvas workspace menu */
  @media (max-width:900px){
    .shell{flex-direction:column; min-height:100dvh}
    .menu-toggle{display:inline-flex}
    .side-close{display:inline-flex; margin-left:auto}
    .nav-backdrop{display:block}

    .sidebar{
      position:fixed; top:0; left:0; bottom:0;
      width:min(17.5rem, 86vw);
      flex:none; height:100%; max-height:100dvh;
      border-right:1px solid var(--border);
      border-bottom:none;
      padding:.75rem .7rem calc(.75rem + env(safe-area-inset-bottom, 0px));
      padding-left:max(.7rem, env(safe-area-inset-left, 0px));
      z-index:50;
      transform:translateX(-105%);
      transition:transform .22s ease;
      box-shadow:none;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }
    .shell.menu-open .sidebar{
      transform:translateX(0);
      box-shadow:8px 0 28px rgba(20,24,36,.12);
    }
    .side-brand-minimal{
      display:flex; padding:.15rem .1rem .45rem; margin-bottom:.25rem;
      border-bottom:1px solid var(--border);
    }
    .side-brand-minimal .side-close{display:inline-flex}
    .nav-label{
      display:block;
      padding:.45rem .55rem .3rem;
    }
    .side-nav{
      flex-direction:column; gap:0; overflow:visible;
      padding:0; margin:0;
    }
    .navitem{
      width:100%; margin:0 0 .1rem; white-space:normal;
      padding:.62rem .7rem;
      border:none; background:transparent;
      font-size:var(--fs-sm);
    }
    .navitem.active{
      background:var(--accent-soft);
      border-color:transparent;
    }
    .navitem .count{margin-left:auto}
    .navitem svg{display:block; flex-shrink:0}
    .side-foot{
      margin-top:auto; padding-top:.55rem; border-top:none;
    }
    .theme-label{display:block}
    .theme-row button{font-size:10.5px; padding:.45rem .15rem}
    .theme-row button svg{display:inline-block}

    .main-wrap{width:100%; min-width:0}
    .topbar{
      position:sticky; top:0;
      z-index:25;
      padding:.55rem var(--pad-x);
      gap:.45rem .55rem;
    }
    .topbar-lead{flex:1 1 auto; min-width:0}
    .topbar .sub{
      white-space:nowrap; max-width:min(40vw, 14rem);
    }
    main{padding:var(--pad-y) var(--pad-x) 1.75rem}
    .grid-cards{grid-template-columns:repeat(2, minmax(0, 1fr))}
    .product-card .thumb{height:clamp(100px, 22vw, 130px)}
  }

  /* Phones */
  @media (max-width:640px){
    .portal{padding:1rem .75rem; align-items:flex-start; padding-top:clamp(1.25rem, 8vh, 2.5rem)}
    .portal-card{padding:1.1rem .95rem; border-radius:12px}
    .portal-tabs button{font-size:11.5px; padding:.48rem .3rem}
    .topbar{gap:.4rem .5rem}
    .topbar-lead{flex:1 1 auto; order:0; max-width:calc(100% - 7rem)}
    .topbar .sub{
      white-space:normal; display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical;
      max-width:none;
    }
    .topbar input[type=search]{flex:1 1 100%; max-width:none; order:3}
    .topbar .btn{order:2}
    .topbar-right{margin-left:auto; order:1; flex-shrink:0; gap:.25rem}
    .topbar-box{padding:.28rem .45rem; font-size:10.5px; max-width:7.5rem}
    .page-head h1{font-size:1.15rem}
    .page-head p{font-size:var(--fs-sm)}
    .grid-4{grid-template-columns:repeat(2, minmax(0,1fr))}
    .share-stats{grid-template-columns:repeat(2, minmax(0,1fr))}
    .grid-cards{grid-template-columns:1fr; gap:.85rem}
    .public-grid{grid-template-columns:1fr; gap:.85rem}
    .grid-form-2,.grid-form-4{grid-template-columns:1fr}
    .toolbar > input,.toolbar > select{flex:1 1 100%; max-width:none}
    .sel-bar{align-items:stretch}
    .sel-bar .btn{flex:1 1 auto}
    .product-card .thumb{height:clamp(120px, 36vw, 160px)}
    .product-card h3{font-size:1rem}
    .product-card .price{font-size:1.05rem}
    .modal-backdrop{padding:.5rem; align-items:flex-end}
    .modal{
      width:100%; max-height:min(92vh, 92dvh); border-radius:14px 14px 10px 10px;
      padding:1rem .9rem calc(1rem + env(safe-area-inset-bottom, 0px));
    }
    .modal-actions{justify-content:stretch}
    .modal-actions .btn{flex:1}
    .toast-stack{
      left:clamp(.5rem, 3vw, 1rem); right:clamp(.5rem, 3vw, 1rem);
      bottom:clamp(.5rem, 2vw, .85rem); max-width:none;
    }
    .public-bar{gap:.45rem}
    .link-row{flex-wrap:wrap}
    table{min-width:24rem}
    .sidebar{width:min(18rem, 88vw)}
  }

  /* Very small phones */
  @media (max-width:380px){
    .grid-4,.grid-cards,.public-grid,.share-stats{grid-template-columns:1fr}
    .portal-tabs{flex-direction:column}
    .topbar-box{max-width:6.5rem}
    .topbar-box-logout span{display:none}
    .theme-row button{font-size:9px; letter-spacing:-.01em}
  }

  /* Wide desktops — content breathing room */
  @media (min-width:1400px){
    main{padding-left:clamp(1.2rem, 2.5vw, 2rem); padding-right:clamp(1.2rem, 2.5vw, 2rem)}
    .grid-cards{grid-template-columns:repeat(4, minmax(0, 1fr))}
    .public-grid{
      max-width:1280px;
      grid-template-columns:repeat(4, minmax(0, 1fr));
    }
    .product-card .thumb{height:128px}
  }

  /* Prefer reduced motion */
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{transition:none !important; animation:none !important}
  }

  /* Safe areas (notched phones) */
  @supports (padding: env(safe-area-inset-bottom)){
    .sidebar{padding-left:max(.65rem, env(safe-area-inset-left))}
    main{padding-bottom:max(1.5rem, env(safe-area-inset-bottom))}
    .toast-stack{bottom:max(.6rem, env(safe-area-inset-bottom)); right:max(.6rem, env(safe-area-inset-right))}
  }
</style>
</head>
<body>
  <div id="app"></div>
  <div class="toast-stack" id="toasts"></div>
  <script src="app.js"></script>
</body>
</html>
